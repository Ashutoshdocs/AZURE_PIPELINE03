trigger:
- main

pool:
  name: mypoolx

steps:

- checkout: self

- task: Docker@2
  displayName: Build and Push Docker Image
  inputs:
    containerRegistry: 'DOCKERSERVICECONNECTION'
    repository: 'blazeak/dockerpipeline'
    command: 'buildAndPush'
    Dockerfile: '$(Build.SourcesDirectory)/DOCKERPIPELINE/Dockerfile'
    tags: |
      latest
      $(Build.BuildId)

- script: |
    echo "Stopping old container..."
    docker stop dockerpipeline || true

    echo "Removing old container..."
    docker rm dockerpipeline || true

    echo "Pulling latest image..."
    docker pull blazeak/dockerpipeline:latest

    echo "Starting container..."
    docker run -d \
      --name dockerpipeline \
      --restart always \
      -p 80:5000 \
      blazeak/dockerpipeline:latest

    docker ps
  displayName: Deploy Docker Container